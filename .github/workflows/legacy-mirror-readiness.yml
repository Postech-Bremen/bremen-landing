name: Legacy mirror readiness

on:
  pull_request:
    paths:
      - ".github/workflows/legacy-mirror-readiness.yml"
      - "app/ponix/**"
      - "app/ponix-canvas/**"
      - "lib/cms/**"
      - "lib/data/content-graph.ts"
      - "scripts/**"
      - "docs/content-graph.md"
      - "docs/cms-audit.md"
      - "docs/agentic-workflow.md"
      - "supabase/migrations/**"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  legacy-mirror-readiness:
    name: Legacy mirror readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run legacy mirror readiness guard
        run: pnpm run qa:legacy-mirror-readiness
