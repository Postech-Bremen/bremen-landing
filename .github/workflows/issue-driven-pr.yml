name: Issue-driven PR

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: Check linked issue
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue-driven metadata
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            const body = pr.body || ""
            const branch = pr.head.ref || ""
            const sameRepo = pr.head.repo.full_name === pr.base.repo.full_name

            const closingIssuePattern = /\b(close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi
            const branchPattern = /^(issue|ui|content|db|ops|bug|docs|agent|access|security|chore)\/\d+[-_][a-z0-9][a-z0-9._-]*$/i
            const branchNumberPattern = /^(issue|ui|content|db|ops|bug|docs|agent|access|security|chore)\/(\d+)[-_][a-z0-9][a-z0-9._-]*$/i

            const failures = []
            const linkedIssues = [...body.matchAll(closingIssuePattern)].map((match) => match[2])

            if (linkedIssues.length === 0) {
              failures.push("PR body must include a closing issue reference such as `Closes #123`.")
            }

            if (sameRepo) {
              const branchMatch = branch.match(branchNumberPattern)

              if (!branchPattern.test(branch) || !branchMatch) {
                failures.push(
                  "Internal branch name must match `<type>/<issue-number>-short-slug`, for example `ui/42-video-filter-search`."
                )
              } else if (linkedIssues.length > 0 && !linkedIssues.includes(branchMatch[2])) {
                failures.push(
                  `Internal branch issue number #${branchMatch[2]} must match a closing issue reference in the PR body.`
                )
              }
            }

            if (failures.length > 0) {
              core.setFailed([
                "This repository uses issue-driven development.",
                "",
                ...failures.map((failure) => `- ${failure}`),
                "",
                "See docs/issue-driven-development.md."
              ].join("\n"))
            }
